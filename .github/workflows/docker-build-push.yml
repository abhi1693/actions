---
name: Docker Build Push

on:
  workflow_call:
    inputs:
      runs-on:
        description: Runner label for the build job.
        required: false
        type: string
        default: ubuntu-24.04-arm
      image:
        description: Fully qualified image name passed to docker/metadata-action.
        required: true
        type: string
      context:
        description: Docker build context.
        required: false
        type: string
        default: .
      source-artifact:
        description: Artifact to download into the checked-out workspace before building.
        required: false
        type: string
        default: ""
      file:
        description: Dockerfile path.
        required: true
        type: string
      platforms:
        description: Target platforms for docker/build-push-action.
        required: false
        type: string
        default: linux/arm64
      qemu:
        description: Whether to set up QEMU before Buildx.
        required: false
        type: boolean
        default: false
      build-args:
        description: Multiline Docker build args.
        required: false
        type: string
        default: ""
      target:
        description: Dockerfile target stage.
        required: false
        type: string
        default: ""
      secret-files:
        description: Multiline Docker secret file mappings.
        required: false
        type: string
        default: ""
      build-secret-artifact:
        description: Artifact containing a Docker build secret file.
        required: false
        type: string
        default: ""
      build-secret-file:
        description: File name inside the build secret artifact.
        required: false
        type: string
        default: ""
      build-secret-id:
        description: Docker BuildKit secret id for the artifact file.
        required: false
        type: string
        default: ""
      tags:
        description: Multiline docker/metadata-action tag rules.
        required: true
        type: string
      labels:
        description: Multiline docker/metadata-action labels.
        required: false
        type: string
        default: ""
      cache-scope:
        description: Shared cache scope suffix.
        required: true
        type: string
      short-sha-length:
        description: DOCKER_METADATA_SHORT_SHA_LENGTH value.
        required: false
        type: string
        default: "7"
      push:
        description: Whether to push the built image.
        required: false
        type: boolean
        default: true
    secrets:
      github-token:
        description: Token used to authenticate to GHCR.
        required: true
    outputs:
      tags:
        description: Generated image tags.
        value: ${{ jobs.build.outputs.tags }}
      labels:
        description: Generated image labels.
        value: ${{ jobs.build.outputs.labels }}
      digest:
        description: Pushed image digest.
        value: ${{ jobs.build.outputs.digest }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and publish image
    runs-on: ${{ inputs.runs-on }}
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      digest: ${{ steps.build.outputs.digest }}
    env:
      DOCKER_METADATA_SHORT_SHA_LENGTH: ${{ inputs.short-sha-length }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download source artifact
        if: inputs.source-artifact != ''
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.source-artifact }}
          path: .

      - name: Set up QEMU
        if: inputs.qemu
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.github-token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.image }}
          tags: ${{ inputs.tags }}
          labels: ${{ inputs.labels }}

      - name: Download build secret artifact
        if: inputs.build-secret-artifact != ''
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.build-secret-artifact }}
          path: ${{ runner.temp }}/docker-build-secrets

      - name: Resolve Docker secret files
        id: secret-files
        env:
          BUILD_SECRET_ARTIFACT: ${{ inputs.build-secret-artifact }}
          BUILD_SECRET_FILE: ${{ inputs.build-secret-file }}
          BUILD_SECRET_ID: ${{ inputs.build-secret-id }}
          INPUT_SECRET_FILES: ${{ inputs.secret-files }}
          SECRET_DIR: ${{ runner.temp }}/docker-build-secrets
        run: |
          {
            echo "value<<EOF"
            if [ -n "$INPUT_SECRET_FILES" ]; then
              printf '%s\n' "$INPUT_SECRET_FILES"
            fi
            if [ -n "$BUILD_SECRET_ARTIFACT" ]; then
              printf '%s=%s/%s\n' "$BUILD_SECRET_ID" "$SECRET_DIR" "$BUILD_SECRET_FILE"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve cache settings
        id: cache
        env:
          CACHE_SCOPE: ${{ inputs.cache-scope }}
          IMAGE: ${{ inputs.image }}
          PUSH: ${{ inputs.push }}
        run: |
          {
            echo "from<<EOF"
            if [ "$PUSH" = "true" ]; then
              printf 'type=registry,ref=%s:buildcache-%s\n' "$IMAGE" "$CACHE_SCOPE"
            fi
            printf 'type=gha,scope=%s\n' "$CACHE_SCOPE"
            echo "EOF"
            echo "to<<EOF"
            if [ "$PUSH" = "true" ]; then
              printf 'type=registry,ref=%s:buildcache-%s,mode=max\n' "$IMAGE" "$CACHE_SCOPE"
            fi
            printf 'type=gha,mode=max,scope=%s\n' "$CACHE_SCOPE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          platforms: ${{ inputs.platforms }}
          target: ${{ inputs.target }}
          push: ${{ inputs.push }}
          build-args: ${{ inputs.build-args }}
          secret-files: ${{ steps.secret-files.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: ${{ steps.cache.outputs.from }}
          cache-to: ${{ steps.cache.outputs.to }}
